name: pikatsu
tag: null
deleted_at: null
desc: ''
timezone: 7
flows:
    greetings:
        active: true
        volatile: true
        intents:
            greet:
                type: command
                initial: true
                fallback: false
                condition: content == "greet"
            intial_greet:
                type: text
                initial: true
                fallback: false
                classifier:
                    nlu: greeting
                    match: hello
            startTelegram:
                type: text
                initial: true
                fallback: false
                condition: content == "/start"
            confirmIntent:
                type: text
                initial: false
                fallback: false
                classifier:
                    nlu: yesno
                    match: confirm
            denyIntent:
                type: text
                initial: false
                fallback: false
                classifier:
                    nlu: yesno
                    match: deny
        states:
            gotName:
                transitions:
                    confirmName:
                        fallback: false
                        condition: intent == "confirmIntent"
                    wrongName:
                        condition: intent == "denyIntent"
                action: confirmName
                enter:
                    context.name: content
                initial: false
            askName:
                transitions:
                    gotName:
                        mapping:
                            context.name: content
                        condition: content != "/start"
                action:
                    -
                        name: askName
                initial: false
                end: false
            confirmName:
                transitions: {}
                action:
                    -
                        name: closeGreeting
                    -
                        name: saveUserInfo
                end: true
            init:
                transitions:
                    askName:
                        fallback: true
                initial: true
            wrongName:
                transitions:
                    gotName:
                        fallback: true
                        mapping:
                            context.name: content
                action: reAskName
        actions:
            sayHi:
                type: text
                options:
                    text: Hello what's your name?
            confirmName:
                type: text
                options:
                    text: So your name is $(context.name)?
            askName:
                type: text
                options:
                    text: Hello what's your name?
            confirming:
                type: text
                options:
                    text: asdasda
            closeGreeting:
                type: text
                options:
                    text: 'Welcome to PikaBiasaBot, $(context.name)! You can send "Pokemon Information" to get information about a Pokemon'
            reaskName:
                type: text
                options:
                    text: 'Sorry, so what''s your name?'
            saveUserInfo:
                type: api
                options:
                    uri: 'https://hc4k4ccck4kwskc00gw44ggk.triki.cloud/api/v1/register'
                    method: POST
                    body:
                        name: $(context.name)
            explainPokeInfo:
                type: text
                options:
                    text: 'You can get pokemon information by typing "pokemon information" or "poke info" :)'
            reAskName:
                type: text
                options:
                    text: 'i''m sorry, what''s you name again?'
        methods: {}
    pokeInfo:
        active: true
        volatile: true
        intents:
            pokeInfo:
                type: text
                initial: true
                fallback: false
                classifier:
                    nlu: askPokemon
                    match: pokemon
            pokeName:
                type: text
                initial: false
                fallback: false
            catchPokeCommand:
                type: command
                initial: false
                fallback: false
                condition: content == "pokeInfo"
        states:
            init:
                transitions:
                    askPoke:
                        fallback: true
                initial: true
            getPokeInfo:
                transitions: {}
                action:
                    -
                        name: callPokeAPI
                    -
                        name: explainPokemon
                        condition: result.success
                    -
                        name: pokeImage
                        condition: result.success
                    -
                        name: pokeLost
                        condition: result.success == false
                end: true
            askPoke:
                transitions:
                    getPokeInfo:
                        fallback: true
                        mapping:
                            context.pokeName: content
                action:
                    -
                        name: askPokemon
        actions:
            askPokemon:
                type: text
                options:
                    text: Which Pokemon do you need the info for?
            callPokeAPI:
                type: api
                options:
                    uri: 'https://hc4k4ccck4kwskc00gw44ggk.triki.cloud/api/v1/pokemon'
                    method: POST
                    body:
                        pokemon: $(context.pokeName)
            explainPokemon:
                type: text
                options:
                    text: >-
                        $(result.data.name) is an <$(result.data.type)> Pokemon with $(result.data.weight) weight and $(result.data.height) height,
                        here's a picture of $(result.data.name).
            pokeImage:
                type: template
                options:
                    type: image
                    items:
                        originalContentUrl: $(result.data.image)
                        previewImageUrl: $(result.data.image)
            pokeLost:
                type: text
                options:
                    text: sorry we don't have information for <$(context.pokeName)>
        methods: {}
    fallback:
        active: true
        volatile: true
        intents:
            fallbackIntent:
                type: text
                initial: true
                fallback: true
        states:
            init:
                transitions:
                    init:
                        fallback: true
                action: fallback
                initial: true
                end: true
        actions:
            fallback:
                type: text
                options:
                    text: i cannot understand you yet. Please type "poke info" to get information about a pokemon
        methods: {}
nlus:
    yesno:
        type: keyword
        options:
            keywords:
                confirm:
                    - ya
                    - iya
                    - 'yes'
                deny:
                    - 'no'
                    - gak
                    - nah
                    - tidak
            default: confirm
    askPokemon:
        type: keyword
        options:
            keywords:
                pokemon:
                    - pokmeon information
                    - information
                    - poke info
    greeting:
        type: keyword
        options:
            keywords:
                hello:
                    - hai
                    - hi
                    - hello
                    - ola
methods: {}
config: {}
